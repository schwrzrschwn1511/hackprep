{% extends "base.html" %}

{% block title %}New Team — MMUCTF{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="terminal-box">
        <div class="terminal-bar">
            <span class="terminal-dot red"></span>
            <span class="terminal-dot yellow"></span>
            <span class="terminal-dot green"></span>
            <span class="terminal-title">root@mmuctf — new-team.sh</span>
        </div>
        <div class="auth-body">
            <h1 class="auth-title">CREATE TEAM</h1>
            <p class="auth-subtitle">Spin up a new operator team.</p>

            {% include "components/errors.html" %}

            <form method="post" class="terminal-form auth-form">
                <div class="form-group">
                    <label for="name" class="terminal-label">[TEAM_NAME]</label>
                    <input class="form-control terminal-input" type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="password" class="terminal-label">[TEAM_PASSWORD]</label>
                    <input class="form-control terminal-input" type="password" id="password" name="password" required>
                </div>
                <input type="hidden" name="nonce" value="{{ Session.nonce }}">
                <button type="submit" class="btn btn-primary terminal-btn auth-submit">CREATE</button>

                <div class="auth-meta">
                    <a class="terminal-link" href="{{ url_for('teams.join') }}">Join existing team</a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
